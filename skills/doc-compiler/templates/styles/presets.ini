# Style Presets for doc-compiler
# Each preset controls: section order, density, visual tone, CSS class overrides.
# Loader falls back to templates/ (shared) when a style-specific file is absent.

[deepwiki]
name = "deepwiki"
description = "Architecture-first, dense, diagram-prominent. Designed for OSS maintainers evaluating internals."
section_order = "overview,what-it-does,pipeline,stages,validation,artifacts,filemap,functions,workflow,appendix"
density = "dense"
hero_verbose = false
diagram_weight = "prominent"
toc_sticky = true
proof_position = "bottom"
section_titles = "uppercase"
font_scale = "0.9"
card_padding = "0.75rem"
decorative_whitespace = false

[product]
name = "product"
description = "Polished hero, examples-first, more visual breathing room. Designed for developer product pages."
section_order = "overview,what-it-does,workflow,pipeline,stages,artifacts,validation,filemap,functions,appendix"
density = "comfortable"
hero_verbose = true
diagram_weight = "normal"
toc_sticky = true
proof_position = "inline"
section_titles = "title-case"
font_scale = "1.0"
card_padding = "1.25rem"
decorative_whitespace = true

[minimal]
name = "minimal"
description = "Compact, reference-oriented, reduced ornamentation. Designed for quick lookup and API-style docs."
section_order = "overview,artifacts,stages,validation,functions"
density = "compact"
hero_verbose = false
diagram_weight = "collapsed"
toc_sticky = false
proof_position = "hidden"
section_titles = "plain"
font_scale = "0.85"
card_padding = "0.5rem"
decorative_whitespace = false
